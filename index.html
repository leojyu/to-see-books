<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To See-Books</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.8;
            padding: 40px 20px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        /* 头部 */
        .site-title {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            text-align: center;
            padding: 20px 0 8px;
            border-bottom: 1px solid #eee;
            margin-bottom: 28px;
        }
        .site-title span {
            font-weight: 300;
            color: #888;
        }

        /* 用户状态栏 */
        .user-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            padding: 0 4px;
        }
        .user-bar .user-name {
            color: #222;
            font-weight: 500;
        }
        .user-bar .user-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            padding: 4px 8px;
            transition: 0.15s;
        }
        .user-bar .user-btn:hover {
            color: #222;
        }
        .user-bar .user-btn.logout {
            color: #c0392b;
        }
        .user-bar .user-btn.logout:hover {
            color: #a93226;
        }

        /* 标签栏 */
        .tabs {
            display: flex;
            gap: 0;
            justify-content: center;
            border-bottom: 1px solid #eee;
            margin-bottom: 28px;
            padding-bottom: 2px;
        }
        .tabs button {
            background: none;
            border: none;
            padding: 10px 28px;
            font-size: 16px;
            font-weight: 400;
            color: #888;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            letter-spacing: 0.3px;
            position: relative;
        }
        .tabs button:hover {
            color: #222;
        }
        .tabs button.active {
            color: #222;
            font-weight: 500;
        }
        .tabs button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 28px;
            right: 28px;
            height: 2px;
            background: #222;
        }

        .tab-content {
            display: none;
            animation: fade 0.2s ease;
            padding: 4px 0;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fade {
            0% {
                opacity: 0.4;
            }
            100% {
                opacity: 1;
            }
        }

        /* 书籍列表 */
        .book-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
        }

        .book-card {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.1s;
            position: relative;
        }
        .book-card:hover {
            background: #f9f9f9;
        }
        .book-card .title {
            font-size: 18px;
            font-weight: 500;
        }
        .book-card .author {
            font-size: 14px;
            color: #888;
            margin-top: 1px;
        }
        .book-card .desc {
            font-size: 14px;
            color: #555;
            margin-top: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-card .meta {
            font-size: 13px;
            color: #aaa;
            margin-top: 6px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        .book-card .meta .delete-btn {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 13px;
            padding: 0 4px;
            font-family: inherit;
            transition: 0.15s;
            margin-left: auto;
        }
        .book-card .meta .delete-btn:hover {
            color: #a93226;
            text-decoration: underline;
        }
        .book-card .meta .owner-tag {
            font-size: 11px;
            color: #bbb;
            background: #f5f5f5;
            padding: 0 10px;
            border-radius: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: #aaa;
            font-size: 15px;
            border: 1px dashed #eee;
            border-radius: 4px;
            margin-top: 10px;
        }
        .empty-state .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }

        /* ===== 登录/注册 ===== */
        .auth-box {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 32px 28px;
            max-width: 380px;
            margin: 0 auto;
        }
        .auth-box h3 {
            font-weight: 500;
            font-size: 20px;
            margin-bottom: 4px;
            text-align: center;
        }
        .auth-box .sub {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-box .form-group {
            margin-bottom: 14px;
        }
        .auth-box label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
            color: #333;
        }
        .auth-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            transition: 0.15s;
        }
        .auth-box input:focus {
            outline: none;
            border-color: #888;
        }
        .auth-box .btn {
            width: 100%;
            background: #222;
            border: none;
            color: #fff;
            padding: 8px 0;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
            margin-top: 4px;
        }
        .auth-box .btn:hover {
            background: #444;
        }
        .auth-box .switch-link {
            text-align: center;
            margin-top: 14px;
            font-size: 14px;
            color: #888;
        }
        .auth-box .switch-link button {
            background: none;
            border: none;
            color: #222;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            text-decoration: underline;
            padding: 0 4px;
        }
        .auth-box .switch-link button:hover {
            color: #000;
        }
        .auth-box .auth-msg {
            text-align: center;
            font-size: 14px;
            margin-top: 10px;
            color: #2c7a5a;
        }
        .auth-box .auth-msg.error {
            color: #c0392b;
        }

        /* ===== 出版表单 ===== */
        .publish-form {
            padding: 4px 0;
        }
        .publish-form .form-group {
            margin-bottom: 16px;
        }
        .publish-form label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
            color: #333;
        }
        .publish-form input,
        .publish-form textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 15px;
            font-family: inherit;
            background: #fff;
            transition: 0.15s;
        }
        .publish-form input:focus,
        .publish-form textarea:focus {
            outline: none;
            border-color: #888;
        }
        .publish-form textarea {
            min-height: 60px;
            resize: vertical;
        }

        .drop-zone {
            border: 2px dashed #ddd;
            border-radius: 4px;
            padding: 32px 20px;
            text-align: center;
            color: #aaa;
            transition: 0.2s;
            cursor: pointer;
            background: #fafafa;
            position: relative;
        }
        .drop-zone:hover {
            border-color: #bbb;
            background: #f7f7f7;
        }
        .drop-zone.dragover {
            border-color: #888;
            background: #f0f0f0;
        }
        .drop-zone .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 6px;
        }
        .drop-zone .hint {
            font-size: 14px;
        }
        .drop-zone .file-name {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            margin-top: 6px;
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .preview-area {
            margin-top: 12px;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 12px 16px;
            max-height: 300px;
            overflow-y: auto;
            background: #fafafa;
            font-size: 14px;
            color: #444;
            white-space: pre-wrap;
            line-height: 1.8;
            display: none;
        }
        .preview-area.active {
            display: block;
        }
        .preview-area .label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .btn {
            background: #222;
            border: none;
            color: #fff;
            padding: 8px 28px;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.15s;
            font-family: inherit;
        }
        .btn:hover {
            background: #444;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ddd;
            color: #555;
        }
        .btn-outline:hover {
            background: #f5f5f5;
            border-color: #bbb;
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        #publishMsg {
            margin-top: 12px;
            font-size: 14px;
            color: #2c7a5a;
        }
        #publishMsg.error {
            color: #c0392b;
        }

        /* ===== 阅读器 ===== */
        #reader-view {
            display: none;
            padding: 4px 0;
        }
        #reader-view.active {
            display: block;
            animation: fade 0.25s ease;
        }

        .reader-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .reader-top .b-title {
            font-size: 24px;
            font-weight: 500;
        }
        .reader-top .b-author {
            color: #888;
            font-size: 15px;
            margin-left: 6px;
        }
        .reader-top .back-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
        }
        .reader-top .back-btn:hover {
            color: #222;
        }
        .reader-top .fullscreen-hint {
            font-size: 12px;
            color: #ccc;
            margin-left: 8px;
        }

        .reader-body {
            font-size: 17px;
            line-height: 1.9;
            padding: 0 2px;
            white-space: pre-wrap;
            font-family: inherit;
        }
        .reader-body p {
            margin-bottom: 1.2em;
            text-indent: 2em;
        }

        /* ===== 页脚 ===== */
        .footer {
            margin-top: 40px;
            padding-top: 16px;
            border-top: 1px solid #eee;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px 24px;
            font-size: 13px;
            color: #bbb;
        }
        .footer .sep {
            color: #ddd;
        }
        .footer a,
        .footer .data-btn {
            color: #888;
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 13px;
            font-family: inherit;
            padding: 0;
            transition: 0.15s;
        }
        .footer a:hover,
        .footer .data-btn:hover {
            color: #222;
        }
        .footer .data-btn.import-btn {
            position: relative;
        }
        .footer .data-btn.import-btn input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            body {
                padding: 20px 14px 40px;
            }
            .site-title {
                font-size: 26px;
            }
            .tabs button {
                padding: 8px 14px;
                font-size: 15px;
            }
            .tabs button.active::after {
                left: 14px;
                right: 14px;
            }
            .reader-top .b-title {
                font-size: 20px;
            }
            .reader-body {
                font-size: 16px;
            }
            .drop-zone {
                padding: 24px 16px;
            }
            .drop-zone .icon {
                font-size: 28px;
            }
            .reader-top .fullscreen-hint {
                display: none;
            }
            .footer {
                gap: 8px 16px;
                font-size: 12px;
            }
            .footer .sep {
                display: none;
            }
            .auth-box {
                padding: 24px 18px;
            }
            .user-bar {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- 标题 -->
        <div class="site-title">
            To See<span>·</span>Books
        </div>

        <!-- 用户状态栏 -->
        <div class="user-bar" id="userBar">
            <span id="userDisplay">未登录</span>
            <button class="user-btn" id="loginBtn" style="display:none;">登录</button>
            <button class="user-btn logout" id="logoutBtn" style="display:none;">退出</button>
        </div>

        <!-- 标签 -->
        <div class="tabs" id="tabNav">
            <button class="active" data-tab="recent">最近看过</button>
            <button data-tab="discover">发现</button>
            <button data-tab="publish">出版</button>
        </div>

        <!-- 最近看过 -->
        <div class="tab-content active" id="tab-recent">
            <div class="book-grid" id="recentGrid"></div>
        </div>

        <!-- 发现 -->
        <div class="tab-content" id="tab-discover">
            <div class="book-grid" id="discoverGrid"></div>
        </div>

        <!-- 出版 -->
        <div class="tab-content" id="tab-publish">
            <div id="publishContainer">
                <!-- 由JS动态渲染：登录框 或 出版表单 -->
            </div>
        </div>

        <!-- 阅读器 -->
        <div id="reader-view">
            <div class="reader-top">
                <div>
                    <span class="b-title" id="readerTitle">书名</span>
                    <span class="b-author" id="readerAuthor">作者</span>
                    <span class="fullscreen-hint">· 全屏模式</span>
                </div>
                <button class="back-btn" id="closeReaderBtn">← 关闭</button>
            </div>
            <div class="reader-body" id="readerBody"></div>
        </div>

        <!-- 页脚 -->
        <footer class="footer">
            <span>数据保存在你的浏览器中</span>
            <span class="sep">·</span>
            <button class="data-btn" id="exportBtn">导出数据</button>
            <span class="sep">·</span>
            <button class="data-btn import-btn" id="importBtnWrapper">
                导入数据
                <input type="file" id="importFileInput" accept=".json" />
            </button>
            <span class="sep">·</span>
            <a href="https://github.com/your-username/To-See-Books" target="_blank">GitHub</a>
        </footer>
    </div>

    <script>
        (function() {
            // ============================================================
            //  用户系统
            // ============================================================
            const USER_KEY = 'toseebooks_user';
            const USERS_KEY = 'toseebooks_users';

            function getUsers() {
                const data = localStorage.getItem(USERS_KEY);
                return data ? JSON.parse(data) : {};
            }

            function saveUsers(users) {
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }

            function getCurrentUser() {
                const data = localStorage.getItem(USER_KEY);
                return data ? JSON.parse(data) : null;
            }

            function setCurrentUser(username) {
                if (username) {
                    localStorage.setItem(USER_KEY, JSON.stringify({ username }));
                } else {
                    localStorage.removeItem(USER_KEY);
                }
            }

            function isLoggedIn() {
                return getCurrentUser() !== null;
            }

            function getUsername() {
                const user = getCurrentUser();
                return user ? user.username : null;
            }

            // ============================================================
            //  书籍数据
            // ============================================================
            const STORAGE_KEY = 'toseebooks_books';
            const RECENT_KEY = 'toseebooks_recent';
            const DRAFT_KEY = 'toseebooks_draft';

            function getBooks() {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            }

            function saveBooks(books) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
            }

            function getRecent() {
                const data = localStorage.getItem(RECENT_KEY);
                return data ? JSON.parse(data) : [];
            }

            function saveRecent(recent) {
                localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
            }

            function addRecent(bookId) {
                let recent = getRecent();
                recent = recent.filter(id => id !== bookId);
                recent.unshift(bookId);
                if (recent.length > 20) recent = recent.slice(0, 20);
                saveRecent(recent);
            }

            // ============================================================
            //  渲染书籍列表
            // ============================================================
            function renderBookCard(book, clickHandler, showDelete) {
                const div = document.createElement('div');
                div.className = 'book-card';
                const wordCount = book.content ? book.content.length : 0;
                const isOwner = book.owner && book.owner === getUsername();
                const deleteHtml = (showDelete && isOwner) ?
                    `<button class="delete-btn" data-id="${book.id}">删除</button>` :
                    '';
                const ownerTag = book.owner ? `<span class="owner-tag">${book.owner}</span>` : '';

                div.innerHTML = `
                    <div class="title">${book.title}</div>
                    <div class="author">${book.author}</div>
                    <div class="desc">${book.desc || '（没有简介）'}</div>
                    <div class="meta">
                        <span>${wordCount > 0 ? Math.round(wordCount / 100) * 100 + '+' : 0} 字</span>
                        <span>${book.publishedAt ? new Date(book.publishedAt).toLocaleDateString() : ''}</span>
                        ${ownerTag}
                        ${deleteHtml}
                    </div>
                `;
                div.addEventListener('click', (e) => {
                    // 如果点击的是删除按钮，不触发阅读
                    if (e.target.classList.contains('delete-btn')) return;
                    clickHandler(book);
                });

                // 删除事件
                const delBtn = div.querySelector('.delete-btn');
                if (delBtn) {
                    delBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const id = parseInt(this.dataset.id);
                        if (confirm('确定要删除《' + book.title + '》吗？此操作不可恢复。')) {
                            deleteBook(id);
                        }
                    });
                }
                return div;
            }

            function deleteBook(bookId) {
                let books = getBooks();
                books = books.filter(b => b.id !== bookId);
                saveBooks(books);
                // 清理最近记录
                let recent = getRecent();
                recent = recent.filter(id => id !== bookId);
                saveRecent(recent);
                renderDiscover();
                renderRecent();
                // 如果阅读器开着且正在读这本书，关闭
                if (document.getElementById('reader-view').classList.contains('active')) {
                    const title = document.getElementById('readerTitle').textContent;
                    const book = getBooks().find(b => b.id === bookId);
                    if (!book) closeReader();
                }
            }

            function renderDiscover() {
                const grid = document.getElementById('discoverGrid');
                const books = getBooks();
                grid.innerHTML = '';
                if (books.length === 0) {
                    grid.innerHTML =
                        `<div class="empty-state"><span class="icon">·</span>书库还是空的<br />去「出版」上传你的第一本小说</div>`;
                    return;
                }
                const loggedIn = isLoggedIn();
                books.forEach(book => {
                    grid.appendChild(renderBookCard(book, (b) => openReader(b), loggedIn));
                });
            }

            function renderRecent() {
                const grid = document.getElementById('recentGrid');
                const recentIds = getRecent();
                const books = getBooks();
                const recentBooks = recentIds.map(id => books.find(b => b.id === id)).filter(Boolean);
                grid.innerHTML = '';
                if (recentBooks.length === 0) {
                    grid.innerHTML =
                        `<div class="empty-state"><span class="icon">·</span>还没有阅读记录<br />去「发现」找一本书开始读</div>`;
                    return;
                }
                const loggedIn = isLoggedIn();
                recentBooks.forEach(book => {
                    grid.appendChild(renderBookCard(book, (b) => openReader(b), loggedIn));
                });
            }

            // ============================================================
            //  阅读器
            // ============================================================
            let currentBook = null;

            function openReader(book) {
                addRecent(book.id);
                document.getElementById('reader-view').classList.add('active');
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));

                currentBook = book;
                document.getElementById('readerTitle').textContent = book.title;
                document.getElementById('readerAuthor').textContent = book.author;

                const body = document.getElementById('readerBody');
                if (book.content) {
                    const lines = book.content.split('\n');
                    let html = '';
                    let inPara = false;
                    for (let line of lines) {
                        const trimmed = line.trim();
                        if (trimmed === '') {
                            if (inPara) {
                                html += '</p>';
                                inPara = false;
                            }
                            html += '<br />';
                        } else {
                            if (!inPara) {
                                html += '<p>';
                                inPara = true;
                            } else {
                                html += ' ';
                            }
                            html += trimmed.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                        }
                    }
                    if (inPara) html += '</p>';
                    body.innerHTML = html;
                } else {
                    body.innerHTML = '<p>（本书暂无正文）</p>';
                }

                // 全屏
                requestFullscreen();
            }

            function closeReader() {
                document.getElementById('reader-view').classList.remove('active');
                exitFullscreen();
                const activeTab = document.querySelector('.tabs .active');
                if (activeTab) {
                    document.getElementById('tab-' + activeTab.dataset.tab).classList.add('active');
                } else {
                    document.getElementById('tab-recent').classList.add('active');
                }
                renderRecent();
                renderDiscover();
                currentBook = null;
                renderPublishTab();
            }

            document.getElementById('closeReaderBtn').addEventListener('click', closeReader);

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if (document.getElementById('reader-view').classList.contains('active')) {
                        if (!isFullscreen()) {
                            closeReader();
                        }
                    }
                }
            });

            // ============================================================
            //  全屏
            // ============================================================
            function requestFullscreen() {
                const el = document.documentElement;
                if (el.requestFullscreen) {
                    el.requestFullscreen().catch(function() {});
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                } else if (el.mozRequestFullScreen) {
                    el.mozRequestFullScreen();
                } else if (el.msRequestFullscreen) {
                    el.msRequestFullscreen();
                }
            }

            function exitFullscreen() {
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(function() {});
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }

            function isFullscreen() {
                return !!(document.fullscreenElement || document.webkitFullscreenElement ||
                    document.mozFullScreenElement || document.msFullscreenElement);
            }

            // ============================================================
            //  出版 Tab (根据登录状态渲染)
            // ============================================================
            function renderPublishTab() {
                const container = document.getElementById('publishContainer');
                if (isLoggedIn()) {
                    container.innerHTML = `
                        <div class="publish-form">
                            <div style="margin-bottom:12px;font-size:14px;color:#888;">
                                欢迎回来，<strong>${getUsername()}</strong>
                            </div>
                            <div class="form-group">
                                <label>书名 *</label>
                                <input type="text" id="pubTitle" placeholder="输入书名" />
                            </div>
                            <div class="form-group">
                                <label>作者 *</label>
                                <input type="text" id="pubAuthor" placeholder="你的笔名" />
                            </div>
                            <div class="form-group">
                                <label>简介</label>
                                <textarea id="pubDesc" placeholder="一句话介绍你的小说" rows="2"></textarea>
                            </div>
                            <div class="form-group">
                                <label>上传小说正文（.txt文件）</label>
                                <div class="drop-zone" id="dropZone">
                                    <span class="icon">+</span>
                                    <span class="hint">点击选择 或 将 .txt 文件拖拽到这里</span>
                                    <div class="file-name" id="fileName"></div>
                                    <input type="file" id="fileInput" accept=".txt" />
                                </div>
                                <div class="preview-area" id="previewArea">
                                    <div class="label">预览（前500字）</div>
                                    <div id="previewContent"></div>
                                </div>
                            </div>
                            <div class="btn-group">
                                <button class="btn" id="publishBtn">出版</button>
                                <button class="btn btn-outline" id="clearFormBtn">清空</button>
                            </div>
                            <div id="publishMsg"></div>
                        </div>
                    `;
                    // 重新绑定事件
                    bindPublishEvents();
                    loadDraft();
                } else {
                    container.innerHTML = `
                        <div class="auth-box">
                            <h3>登录以出版</h3>
                            <div class="sub">登录后即可上传和出版你的小说</div>
                            <div id="authForm">
                                <div class="form-group">
                                    <label>用户名</label>
                                    <input type="text" id="authUsername" placeholder="输入用户名" />
                                </div>
                                <div class="form-group">
                                    <label>密码</label>
                                    <input type="password" id="authPassword" placeholder="输入密码" />
                                </div>
                                <button class="btn" id="authLoginBtn">登录</button>
                                <div class="switch-link">
                                    还没有账号？ <button id="authSwitchBtn">注册</button>
                                </div>
                                <div id="authMsg"></div>
                            </div>
                        </div>
                    `;
                    bindAuthEvents();
                }
            }

            // ============================================================
            //  认证事件
            // ============================================================
            let authMode = 'login'; // 'login' | 'register'

            function bindAuthEvents() {
                const loginBtn = document.getElementById('authLoginBtn');
                const switchBtn = document.getElementById('authSwitchBtn');
                const msg = document.getElementById('authMsg');

                if (!loginBtn) return;

                function doAuth() {
                    const username = document.getElementById('authUsername').value.trim();
                    const password = document.getElementById('authPassword').value.trim();
                    if (!username || !password) {
                        msg.textContent = '请填写用户名和密码';
                        msg.className = 'auth-msg error';
                        return;
                    }
                    const users = getUsers();

                    if (authMode === 'login') {
                        if (users[username] && users[username] === password) {
                            setCurrentUser(username);
                            msg.textContent = '登录成功！';
                            msg.className = 'auth-msg';
                            updateUserBar();
                            renderPublishTab();
                            renderDiscover();
                            renderRecent();
                            // 切换到出版tab
                            switchTab('publish');
                        } else {
                            msg.textContent = '用户名或密码错误';
                            msg.className = 'auth-msg error';
                        }
                    } else {
                        // 注册
                        if (users[username]) {
                            msg.textContent = '用户名已存在';
                            msg.className = 'auth-msg error';
                            return;
                        }
                        users[username] = password;
                        saveUsers(users);
                        setCurrentUser(username);
                        msg.textContent = '注册成功！已自动登录';
                        msg.className = 'auth-msg';
                        updateUserBar();
                        renderPublishTab();
                        renderDiscover();
                        renderRecent();
                        switchTab('publish');
                    }
                }

                loginBtn.addEventListener('click', doAuth);

                document.getElementById('authPassword').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') doAuth();
                });
                document.getElementById('authUsername').addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') doAuth();
                });

                switchBtn.addEventListener('click', function() {
                    if (authMode === 'login') {
                        authMode = 'register';
                        loginBtn.textContent = '注册';
                        switchBtn.textContent = '返回登录';
                        document.querySelector('.auth-box .sub').textContent = '注册新账号，立即开始出版';
                        msg.textContent = '';
                        msg.className = 'auth-msg';
                    } else {
                        authMode = 'login';
                        loginBtn.textContent = '登录';
                        switchBtn.textContent = '注册';
                        document.querySelector('.auth-box .sub').textContent = '登录后即可上传和出版你的小说';
                        msg.textContent = '';
                        msg.className = 'auth-msg';
                    }
                });
            }

            // ============================================================
            //  用户栏
            // ============================================================
            function updateUserBar() {
                const display = document.getElementById('userDisplay');
                const loginBtn = document.getElementById('loginBtn');
                const logoutBtn = document.getElementById('logoutBtn');

                if (isLoggedIn()) {
                    display.innerHTML = '👤 <span class="user-name">' + getUsername() + '</span>';
                    loginBtn.style.display = 'none';
                    logoutBtn.style.display = 'inline';
                } else {
                    display.textContent = '未登录';
                    loginBtn.style.display = 'inline';
                    logoutBtn.style.display = 'none';
                }
            }

            document.getElementById('loginBtn').addEventListener('click', function() {
                switchTab('publish');
            });

            document.getElementById('logoutBtn').addEventListener('click', function() {
                if (confirm('确定退出登录？')) {
                    setCurrentUser(null);
                    updateUserBar();
                    renderPublishTab();
                    renderDiscover();
                    renderRecent();
                    // 如果阅读器开着，不关闭，但删除按钮会消失
                    if (document.getElementById('reader-view').classList.contains('active')) {
                        // 刷新阅读器中的删除按钮状态需要关闭重开，这里简单处理：刷新列表
                        renderDiscover();
                        renderRecent();
                    }
                    switchTab('recent');
                }
            });

            // ============================================================
            //  出版功能
            // ============================================================
            let uploadedContent = '';
            let uploadedFileName = '';

            function bindPublishEvents() {
                const dropZone = document.getElementById('dropZone');
                const fileInput = document.getElementById('fileInput');
                const fileName = document.getElementById('fileName');
                const previewArea = document.getElementById('previewArea');
                const previewContent = document.getElementById('previewContent');

                if (!dropZone) return;

                function handleFile(file) {
                    if (!file || !file.name.endsWith('.txt')) {
                        alert('请上传 .txt 文件');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        uploadedContent = e.target.result;
                        uploadedFileName = file.name;
                        fileName.textContent = '✔ ' + file.name + '（' + uploadedContent.length + ' 字）';
                        const preview = uploadedContent.slice(0, 500) + (uploadedContent.length > 500 ? '……' : '');
                        previewContent.textContent = preview;
                        previewArea.classList.add('active');
                        document.getElementById('publishMsg').textContent = '';
                        saveDraft();
                    };
                    reader.readAsText(file, 'UTF-8');
                }

                fileInput.addEventListener('change', function(e) {
                    if (this.files.length > 0) {
                        handleFile(this.files[0]);
                    }
                });

                dropZone.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('dragover');
                });
                dropZone.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                });
                dropZone.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                    if (e.dataTransfer.files.length > 0) {
                        handleFile(e.dataTransfer.files[0]);
                    }
                });

                // 出版按钮
                document.getElementById('publishBtn').addEventListener('click', function() {
                    const title = document.getElementById('pubTitle').value.trim();
                    const author = document.getElementById('pubAuthor').value.trim();
                    const desc = document.getElementById('pubDesc').value.trim();
                    const msg = document.getElementById('publishMsg');

                    if (!title || !author) {
                        msg.textContent = '请填写书名和作者';
                        msg.className = 'error';
                        return;
                    }
                    if (!uploadedContent) {
                        msg.textContent = '请上传小说的 .txt 文件';
                        msg.className = 'error';
                        return;
                    }

                    const books = getBooks();
                    books.push({
                        id: Date.now(),
                        title: title,
                        author: author,
                        desc: desc || '（没有简介）',
                        content: uploadedContent,
                        owner: getUsername(),
                        publishedAt: Date.now()
                    });
                    saveBooks(books);

                    document.getElementById('pubTitle').value = '';
                    document.getElementById('pubAuthor').value = '';
                    document.getElementById('pubDesc').value = '';
                    uploadedContent = '';
                    uploadedFileName = '';
                    fileName.textContent = '';
                    previewArea.classList.remove('active');
                    previewContent.textContent = '';
                    fileInput.value = '';
                    localStorage.removeItem(DRAFT_KEY);

                    msg.textContent = '出版成功！去「发现」看看你的书吧';
                    msg.className = '';

                    renderDiscover();
                    renderRecent();
                    switchTab('discover');
                });

                // 清空
                document.getElementById('clearFormBtn').addEventListener('click', function() {
                    if (confirm('确定清空所有已填内容？')) {
                        document.getElementById('pubTitle').value = '';
                        document.getElementById('pubAuthor').value = '';
                        document.getElementById('pubDesc').value = '';
                        uploadedContent = '';
                        uploadedFileName = '';
                        fileName.textContent = '';
                        previewArea.classList.remove('active');
                        previewContent.textContent = '';
                        fileInput.value = '';
                        document.getElementById('publishMsg').textContent = '';
                        document.getElementById('publishMsg').className = '';
                        localStorage.removeItem(DRAFT_KEY);
                    }
                });
            }

            // ============================================================
            //  草稿
            // ============================================================
            function saveDraft() {
                if (!isLoggedIn()) return;
                const draft = {
                    title: document.getElementById('pubTitle') ? document.getElementById('pubTitle').value : '',
                    author: document.getElementById('pubAuthor') ? document.getElementById('pubAuthor').value : '',
                    desc: document.getElementById('pubDesc') ? document.getElementById('pubDesc').value : '',
                    fileName: uploadedFileName,
                    content: uploadedContent
                };
                try {
                    localStorage.setItem(DRAFT_KEY, JSON.stringify(draft));
                } catch (e) {}
            }

            function loadDraft() {
                if (!isLoggedIn()) return;
                try {
                    const raw = localStorage.getItem(DRAFT_KEY);
                    if (!raw) return;
                    const draft = JSON.parse(raw);
                    const titleEl = document.getElementById('pubTitle');
                    const authorEl = document.getElementById('pubAuthor');
                    const descEl = document.getElementById('pubDesc');
                    if (titleEl && draft.title) titleEl.value = draft.title;
                    if (authorEl && draft.author) authorEl.value = draft.author;
                    if (descEl && draft.desc) descEl.value = draft.desc;
                    if (draft.content) {
                        uploadedContent = draft.content;
                        uploadedFileName = draft.fileName || '草稿.txt';
                        const fn = document.getElementById('fileName');
                        const pa = document.getElementById('previewArea');
                        const pc = document.getElementById('previewContent');
                        if (fn) fn.textContent = '✔ ' + uploadedFileName + '（' + uploadedContent.length + ' 字）';
                        if (pc) {
                            const preview = uploadedContent.slice(0, 500) + (uploadedContent.length > 500 ? '……' : '');
                            pc.textContent = preview;
                        }
                        if (pa) pa.classList.add('active');
                    }
                } catch (e) {}
            }

            // 自动保存草稿
            document.addEventListener('input', function(e) {
                if (e.target.closest('#publishContainer') && isLoggedIn()) {
                    saveDraft();
                }
            });

            // ============================================================
            //  导出 / 导入
            // ============================================================
            document.getElementById('exportBtn').addEventListener('click', function() {
                const books = getBooks();
                const recent = getRecent();
                const data = {
                    version: '1.0',
                    exportedAt: new Date().toISOString(),
                    books: books,
                    recent: recent
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'toseebooks_data.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            document.getElementById('importFileInput').addEventListener('change', function(e) {
                if (this.files.length === 0) return;
                const file = this.files[0];
                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (!data.books || !Array.isArray(data.books)) {
                            alert('无效的数据文件：缺少 books 数组');
                            return;
                        }
                        const currentCount = getBooks().length;
                        const msg =
                            `将导入 ${data.books.length} 本书，当前书库有 ${currentCount} 本书。\n\n是否覆盖当前所有数据？\n（选择「确定」将替换全部数据，「取消」则放弃导入）`;
                        if (!confirm(msg)) return;
                        saveBooks(data.books);
                        if (data.recent && Array.isArray(data.recent)) {
                            saveRecent(data.recent);
                        }
                        renderDiscover();
                        renderRecent();
                        if (document.getElementById('reader-view').classList.contains('active')) {
                            closeReader();
                        }
                        alert('导入成功！共导入 ' + data.books.length + ' 本书。');
                    } catch (err) {
                        alert('导入失败：文件格式错误，请确保是有效的 JSON 文件。\n' + err.message);
                    }
                };
                reader.readAsText(file);
                this.value = '';
            });

            // ============================================================
            //  Tab切换
            // ============================================================
            function switchTab(tabId) {
                if (document.getElementById('reader-view').classList.contains('active')) {
                    closeReader();
                    setTimeout(() => {
                        doSwitch(tabId);
                    }, 100);
                } else {
                    doSwitch(tabId);
                }
            }

            function doSwitch(tabId) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
                document.getElementById('tab-' + tabId).classList.add('active');
                document.querySelector(`.tabs button[data-tab="${tabId}"]`).classList.add('active');
                // 如果切换到出版，重新渲染
                if (tabId === 'publish') {
                    renderPublishTab();
                }
            }

            document.querySelectorAll('.tabs button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabId = this.dataset.tab;
                    if (document.getElementById('reader-view').classList.contains('active')) {
                        closeReader();
                        setTimeout(() => {
                            doSwitch(tabId);
                        }, 100);
                    } else {
                        doSwitch(tabId);
                    }
                });
            });

            // ============================================================
            //  初始化
            // ============================================================
            updateUserBar();
            renderDiscover();
            renderRecent();
            renderPublishTab();
            doSwitch('recent');

            // 如果已经登录，自动加载草稿
            if (isLoggedIn()) {
                setTimeout(loadDraft, 100);
            }

            console.log('To See-Books 已启动 | 登录后才能出版');
        })();
    </script>

</body>
</html>
